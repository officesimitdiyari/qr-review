<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yönlendiriliyorsunuz...</title>
    <script>
    function sendDataAndRedirect() {
        // 1. URL'deki ID parametresini al (Örn: sayfa.html?id=8)
        const urlParams = new URLSearchParams(window.location.search);
        const qrId = urlParams.get('id') || 'bilinmeyen';

        // 2. Google Script linkini buraya yapıştır (Sonuna id'yi ekleyerek)
        const scriptUrl = "https://script.google.com/macros/s/AKfycbxchVyxSZovc5mhfhcY6-jThYTWi_BsnFZAnAMeoFi4J85w9xalLlm7KezHOGy8qDIo/exec?id=5" + qrId;

        // 3. Veriyi arka planda gönder (beacon yöntemi mobilde en hızlısıdır)
        navigator.sendBeacon(scriptUrl);

        // 4. Beklemeden Google Review sayfasına uçur
        window.location.replace("https://g.page/r/CeRrjvHiDBp2EAE/review");
    }
    </script>
</head>
<body onload="sendDataAndRedirect()" style="text-align:center; font-family:sans-serif; margin-top:50px;">
    <img src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png" width="100">
    <p>Einen Moment bitte...</p>
</body>
</html>
